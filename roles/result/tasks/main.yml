---
- name: Install nodejs and npm
  become: true
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present

- name: Unzip result
  ansible.builtin.unarchive:
    src: ./result.tar
    dest: /tmp/
    mode: "0755"
    extra_opts:
      - --no-same-owner

- name: Uploads dependencies
  become: true
  community.general.npm:
    path: /tmp/result
    production: true

- name: Copy systemd service file to server
  become: true
  ansible.builtin.template:
    src: result.service.j2
    dest: /etc/systemd/system/result.service
    mode: "0644"
  notify: restart result
